name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.25"

            - name: Build Windows amd64
              run: GOOS=windows GOARCH=amd64 go build -o gitsubset-windows-amd64.exe ./gitsubset

            - name: Build Linux amd64
              run: GOOS=linux GOARCH=amd64 go build -o gitsubset-linux-amd64 ./gitsubset

            - name: Build macOS amd64
              run: GOOS=darwin GOARCH=amd64 go build -o gitsubset-darwin-amd64 ./gitsubset

            - name: Build macOS arm64
              run: GOOS=darwin GOARCH=arm64 go build -o gitsubset-darwin-arm64 ./gitsubset

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      gitsubset-windows-amd64.exe
                      gitsubset-linux-amd64
                      gitsubset-darwin-amd64
                      gitsubset-darwin-arm64
                  generate_release_notes: true
